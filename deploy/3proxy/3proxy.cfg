# 3proxy SOCKS5 config for Yandex relay
# Per-user credentials loaded from users.conf (gitignored)

log /var/log/3proxy/3proxy.log D
rotate 14
# Human-readable log fields help quickly separate auth issues from routing issues.
logformat "L%Y-%m-%dT%H:%M:%S.%. service=%N.%p err=%E user=%U client=%C:%c target=%R:%r requested=%Q:%q bytes_out=%O bytes_in=%I hops=%h duration=%T"

# Load user credentials
include /etc/3proxy/users.conf

auth strong
allow *

# SOCKS5 behind nginx stream on localhost
socks -p1080 -i127.0.0.1

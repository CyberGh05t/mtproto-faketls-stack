user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

stream {
    map $ssl_preread_server_name $backend {
        yandex.ru  127.0.0.1:3128;  # → telemt (MTProto)
        default    127.0.0.1:8443;  # → сайт-заглушка
    }

    server {
        listen 443;
        listen [::]:443;
        proxy_pass $backend;
        ssl_preread on;
        proxy_connect_timeout 5s;
        proxy_timeout 600s;
    }
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        listen [::]:80;
        server_name plitkaklal.ru;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 127.0.0.1:8443 ssl http2;
        server_name plitkaklal.ru;

        ssl_certificate /etc/letsencrypt/live/plitkaklal.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/plitkaklal.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_ecdh_curve X25519:prime256v1:secp384r1;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        root /var/www/decoy;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}

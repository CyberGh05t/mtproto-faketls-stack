global
    log /dev/log local0
    maxconn 4096
    daemon

defaults
    mode tcp
    log global
    option tcplog
    timeout connect 5s
    timeout client 1m
    timeout server 1m

frontend ft_443
    bind *:443
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }
    tcp-request content accept if { req.payload(0,1) -m bin 05 }
    tcp-request content accept if { req.len 0 }

    acl is_tls    req.ssl_hello_type 1
    acl is_socks5 req.payload(0,1) -m bin 05
    acl is_yandex req.ssl_sni -i yandex.ru

    use_backend bk_telemt      if is_tls is_yandex
    use_backend bk_3proxy      if is_socks5
    use_backend bk_nginx_decoy if is_tls !is_yandex
    default_backend bk_nginx_decoy

backend bk_telemt
    server telemt 127.0.0.1:3128 check

backend bk_nginx_decoy
    server nginx 127.0.0.1:8443 check

backend bk_3proxy
    timeout connect 5s
    timeout client 5m
    timeout server 5m
    server socks5 127.0.0.1:1080 check
